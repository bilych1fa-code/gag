<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ice Fishing Draw</title>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
        body{width:100vw;height:100vh;overflow:hidden;font-family:'Arial Black',Arial,sans-serif;background:#0a2a4a;}
        img{-webkit-user-drag:none;user-drag:none;-webkit-touch-callout:none;pointer-events:none;display:block;}
        :root{--safe-top:max(16px,env(safe-area-inset-top,16px));--btn-color:#c8f000;--btn-shadow:#5a7000;--btn-border:#8ab000;}

        /* ── Screens ── */
        .screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;overflow:hidden;}
        .screen.active{display:flex;}
        .bg{position:absolute;inset:0;z-index:0;}
        .bg img{width:100%;height:100%;object-fit:cover;}

        /* ── Bubbles ── */
        .bbl{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
        .bub{position:absolute;border-radius:50%;background:rgba(150,220,255,.15);animation:rise linear infinite;}
        @keyframes rise{0%{transform:translateY(100vh) scale(0);opacity:0;}15%{opacity:1;}90%{opacity:.35;}100%{transform:translateY(-8vh) scale(1);opacity:0;}}

        /* ── Buttons ── */
        .img-btn{cursor:pointer;transition:transform .11s;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));}
        .img-btn:active{transform:scale(.91) translateY(3px);}
        .img-btn img{width:100%;}

        /* ── LOADING ── */
        #screen-loading .lbody{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:var(--safe-top) 10% 10%;}
        .l-title{width:82%;margin-top:2%;}
        .l-title img{width:100%;filter:drop-shadow(0 3px 12px rgba(0,0,0,.35));}
        .l-logo{width:58%;flex:1;display:flex;align-items:center;}
        .l-logo img{width:100%;filter:drop-shadow(0 6px 16px rgba(0,0,0,.3));animation:fishBob 2.2s ease-in-out infinite;}
        @keyframes fishBob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-14px) rotate(2deg);}}
        .l-bar-wrap{width:100%;}
        .l-bar-label{font-size:clamp(10px,3.2vw,14px);font-weight:900;color:rgba(80,80,120,.9);letter-spacing:3px;text-align:center;margin-bottom:6px;}
        .l-track{width:100%;height:clamp(22px,5.5vw,32px);background:rgba(180,190,220,.55);border-radius:50px;border:2px solid rgba(255,255,255,.4);overflow:hidden;box-shadow:inset 0 2px 6px rgba(0,0,0,.18);}
        #l-fill{height:100%;width:0%;background:linear-gradient(90deg,#a8d400,#d4f000);border-radius:50px;transition:width .06s linear;position:relative;}
        #l-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);background-size:200%;animation:shine 1s linear infinite;border-radius:50px;}
        @keyframes shine{to{background-position:200%;}}

        /* ── MENU ── */
        #screen-menu .mbody{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:var(--safe-top) 12% 8%;}
        .m-title{width:80%;margin-top:2%;}
        .m-title img{width:100%;filter:drop-shadow(0 3px 12px rgba(0,0,0,.35));animation:titleGlow 2.5s ease-in-out infinite alternate;}
        @keyframes titleGlow{from{filter:drop-shadow(0 3px 12px rgba(0,0,0,.35)) drop-shadow(0 0 6px rgba(180,255,0,.2));}to{filter:drop-shadow(0 3px 12px rgba(0,0,0,.35)) drop-shadow(0 0 28px rgba(200,255,0,.7));}}
        .m-logo{width:55%;flex:1;display:flex;align-items:center;justify-content:center;}
        .m-logo img{width:100%;filter:drop-shadow(0 6px 16px rgba(0,0,0,.3));animation:fishBob 2.8s ease-in-out infinite;}
        .m-btns{width:72%;display:flex;flex-direction:column;gap:12px;}
        .m-btn{width:100%;}

        /* ── SETTINGS ── */
        #screen-settings .sbody{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--safe-top) 12% 10%;gap:0;}
        .s-title{width:65%;margin-bottom:8%;}
        .s-title img{width:100%;filter:drop-shadow(0 3px 10px rgba(0,0,0,.3));}
        .s-section{width:100%;margin-bottom:6%;}
        .s-label{font-size:clamp(13px,4vw,20px);font-weight:900;color:#e0f4ff;letter-spacing:3px;text-align:center;margin-bottom:8px;text-shadow:0 1px 4px rgba(0,0,0,.4);}
        .s-slider-wrap{width:100%;height:clamp(24px,6vw,34px);background:rgba(130,160,220,.35);border-radius:50px;border:2px solid rgba(255,255,255,.3);overflow:hidden;cursor:pointer;position:relative;box-shadow:inset 0 2px 5px rgba(0,0,0,.2);}
        .s-slider-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#8ab000,#c8f000);transition:width .08s;position:relative;}
        .s-slider-fill::after{content:'';position:absolute;right:-2px;top:50%;transform:translateY(-50%);width:clamp(20px,5.5vw,30px);height:clamp(20px,5.5vw,30px);background:rgba(255,255,255,.9);border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3);}
        .s-home{width:72%;margin-top:10%;}

        /* ── GAME ── */
        #screen-game .gwrap{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;}
        .g-bar{flex-shrink:0;background:#95AFE9;padding:var(--safe-top) 14px 10px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 10px rgba(0,0,0,.2);}
        .g-score{font-size:clamp(22px,7vw,38px);font-weight:900;color:#c8f000;text-shadow:2px 2px 0 rgba(0,0,0,.4),0 0 18px rgba(160,220,0,.5);letter-spacing:2px;flex:1;text-align:center;}
        .g-pause-btn{cursor:pointer;transition:transform .11s;flex-shrink:0;}
        .g-pause-btn:active{transform:scale(.87);}
        .g-pause-btn img{width:clamp(40px,11vw,56px);filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));}
        .g-score-spacer{width:clamp(40px,11vw,56px);}/* balance the score */
        .game-area{flex:1;position:relative;overflow:hidden;}
        #fish-canvas{position:absolute;inset:0;width:100%;height:100%;}
        #draw-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:3;}

        /* ── PAUSE overlay ── */
        #overlay-pause{position:absolute;inset:0;z-index:20;display:none;}
        #overlay-pause.active{display:block;}
        .ov-bg{position:absolute;inset:0;background:rgba(0,15,40,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
        .pause-ui{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:var(--safe-top) 16px 20px;}
        .p-title{width:60%;margin-bottom:4%;}
        .p-title img{width:100%;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));}
        .p-btn{width:65%;}

        /* ── RESULT ── */
        #screen-result .rbody{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:var(--safe-top) 12% 8%;}
        .r-title{width:86%;margin-top:2%;}
        .r-title img{width:100%;filter:drop-shadow(0 4px 14px rgba(0,0,0,.4));animation:titlePop .5s cubic-bezier(.68,-.55,.27,1.55);}
        @keyframes titlePop{from{transform:scale(.2);opacity:0;}to{transform:scale(1);opacity:1;}}
        .r-logo{width:52%;flex:1;display:flex;align-items:center;justify-content:center;}
        .r-logo img{width:100%;filter:drop-shadow(0 6px 16px rgba(0,0,0,.3));animation:fishBob 2.5s ease-in-out infinite;}
        .r-btns{width:72%;display:flex;flex-direction:column;gap:12px;}
        .r-btn{width:100%;}

        /* ── Catch flash ── */
        .catch-flash{position:absolute;inset:0;z-index:10;pointer-events:none;border-radius:4px;}
        .catch-flash.good{animation:flashGreen .6s ease-out forwards;}
        .catch-flash.bad{animation:flashRed .6s ease-out forwards;}
        @keyframes flashGreen{0%{background:rgba(100,255,80,0);}30%{background:rgba(100,255,80,.45);}100%{background:rgba(100,255,80,0);}}
        @keyframes flashRed{0%{background:rgba(255,60,40,0);}30%{background:rgba(255,60,40,.5);}100%{background:rgba(255,60,40,0);}}

        /* ── Score popup ── */
        .score-pop{position:absolute;z-index:15;font-size:clamp(20px,7vw,36px);font-weight:900;color:#c8f000;text-shadow:2px 2px 0 rgba(0,0,0,.5),0 0 18px rgba(180,255,0,.8);pointer-events:none;white-space:nowrap;animation:scorePop 1.4s ease-out forwards;}
        @keyframes scorePop{0%{transform:translateY(0) scale(.4);opacity:1;}60%{transform:translateY(-55px) scale(1.2);opacity:1;}100%{transform:translateY(-110px) scale(1);opacity:0;}}

        /* ── Confetti ── */
        .conf{position:absolute;pointer-events:none;z-index:8;border-radius:2px;animation:confFall linear forwards;}
        @keyframes confFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
    </style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
    <div class="bg"><img src="img/main_bg.png" alt="" draggable="false"></div>
    <div class="bbl" id="bbl0"></div>
    <div class="lbody">
        <div class="l-title"><img src="img/logo_title.png" alt="" draggable="false"></div>
        <div class="l-logo"><img src="img/logo.png" alt="" draggable="false"></div>
        <div class="l-bar-wrap">
            <div class="l-bar-label">LOADING...</div>
            <div class="l-track"><div id="l-fill"></div></div>
        </div>
    </div>
</div>

<!-- MENU -->
<div id="screen-menu" class="screen">
    <div class="bg"><img src="img/main_bg.png" alt="" draggable="false"></div>
    <div class="bbl" id="bbl1"></div>
    <div class="mbody">
        <div class="m-title"><img src="img/logo_title.png" alt="" draggable="false"></div>
        <div class="m-logo"><img src="img/logo.png" alt="" draggable="false"></div>
        <div class="m-btns">
            <div class="m-btn img-btn" id="btn-settings"><img src="img/btn_setting.png" alt="" draggable="false"></div>
            <div class="m-btn img-btn" id="btn-play"><img src="img/btn_play.png" alt="" draggable="false"></div>
        </div>
    </div>
</div>

<!-- SETTINGS -->
<div id="screen-settings" class="screen">
    <div class="bg"><img src="img/game_bg.png" alt="" draggable="false"></div>
    <div class="bbl" id="bbl2"></div>
    <div class="sbody">
        <div class="s-title"><img src="img/setting_title.png" alt="" draggable="false"></div>
        <div class="s-section">
            <div class="s-label">SOUND</div>
            <div class="s-slider-wrap" id="sl-sound" data-key="sound">
                <div class="s-slider-fill" id="sl-sound-fill" style="width:80%"></div>
            </div>
        </div>
        <div class="s-section">
            <div class="s-label">MUSIC</div>
            <div class="s-slider-wrap" id="sl-music" data-key="music">
                <div class="s-slider-fill" id="sl-music-fill" style="width:60%"></div>
            </div>
        </div>
        <div class="s-home img-btn" id="btn-sett-home"><img src="img/btn_home.png" alt="" draggable="false"></div>
    </div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
    <div class="bg"><img src="img/game_bg.png" alt="" draggable="false"></div>
    <div class="gwrap">
        <div class="g-bar">
            <div class="g-score-spacer"></div>
            <div class="g-score" id="score-label">0</div>
            <div class="g-pause-btn" id="btn-pause">
                <img src="img/btn_pause.png" id="pause-btn-img" alt="" draggable="false">
            </div>
        </div>
        <div class="game-area" id="game-area">
            <canvas id="fish-canvas"></canvas>
            <canvas id="draw-canvas"></canvas>
        </div>

        <!-- PAUSE overlay -->
        <div id="overlay-pause">
            <div class="ov-bg"></div>
            <!-- btn_icon_resume sits exactly where btn_pause is -->
            <div class="g-pause-btn" id="btn-topbar-resume"
                 style="position:absolute;top:var(--safe-top);right:14px;z-index:30;display:none;">
                <img src="img/btn_icon_resume.png" alt="" draggable="false">
            </div>
            <div class="pause-ui">
                <div class="p-title"><img src="img/pause_title.png" alt="" draggable="false"></div>
                <div class="p-btn img-btn" id="btn-resume"><img src="img/btn_resume.png" alt="" draggable="false"></div>
                <div class="p-btn img-btn" id="btn-pause-home"><img src="img/btn_home.png" alt="" draggable="false"></div>
            </div>
        </div>
    </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
    <div class="bg"><img src="img/main_bg.png" alt="" draggable="false"></div>
    <div class="bbl" id="bbl4"></div>
    <div class="rbody">
        <div class="r-title"><img src="img/result_title.png" alt="" draggable="false"></div>
        <div class="r-logo"><img src="img/logo.png" alt="" draggable="false"></div>
        <div class="r-btns">
            <div class="r-btn img-btn" id="btn-retry"><img src="img/btn_retry.png" alt="" draggable="false"></div>
            <div class="r-btn img-btn" id="btn-res-home"><img src="img/btn_home.png" alt="" draggable="false"></div>
        </div>
    </div>
</div>

<audio id="aud-music" src="img/music.mp3" loop></audio>
<audio id="aud-lose" src="img/lose.mp3"></audio>

<script>
    'use strict';

    /* ══ STATE ══════════════════════════════════════════ */
    const S = {
        screen: 'loading',
        musicOn: true, soundOn: true, audReady: false,
        musicVol: 0.6, soundVol: 0.8,
        paused: false, gameRunning: false,
        score: 0, round: 0,
    };

    /* ══ STORAGE ════════════════════════════════════════ */
    function loadPrefs() {
        const get = (k, def) => { const v = localStorage.getItem('ifd_'+k); return v === null ? def : parseFloat(v); };
        S.musicVol = get('musicVol', 0.6);
        S.soundVol = get('soundVol', 0.8);
    }
    function savePrefs() {
        localStorage.setItem('ifd_musicVol', S.musicVol);
        localStorage.setItem('ifd_soundVol', S.soundVol);
    }

    /* ══ AUDIO ══════════════════════════════════════════ */
    const MUSIC = document.getElementById('aud-music');
    const LOSE  = document.getElementById('aud-lose');
    const _AC = new (window.AudioContext || window.webkitAudioContext)();
    function _beep(f, d, t, v) {
        if (_AC.state === 'suspended') return;
        const o = _AC.createOscillator(), g = _AC.createGain();
        o.connect(g); g.connect(_AC.destination);
        o.type = t; o.frequency.value = f;
        g.gain.setValueAtTime(v * S.soundVol, _AC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, _AC.currentTime + d);
        o.start(); o.stop(_AC.currentTime + d);
    }
    function sndClick() { _beep(900, .07, 'square', .16); }
    function sndCatch()  {
        [523,659,784,1047].forEach((f,i) => setTimeout(() => _beep(f, .18, 'sine', .22), i*80));
    }
    function sndFail()   {
        _beep(220, .3, 'sawtooth', .25);
        setTimeout(() => _beep(160, .4, 'sawtooth', .2), 180);
    }
    function sndLose() {
        stopMusic();
        LOSE.currentTime = 0;
        LOSE.volume = Math.max(0.1, S.soundVol);
        LOSE.play().catch(() => {});
    }
    function sndDraw()   { _beep(1400, .04, 'sine', .06); }

    function unlockAudio() {
        if (S.audReady) return; S.audReady = true;
        _AC.resume();
        MUSIC.volume = S.musicVol;
        MUSIC.play().catch(() => {});
    }
    function playMusic() { if (!S.audReady) return; MUSIC.volume = S.musicVol; if (MUSIC.paused) MUSIC.play().catch(() => {}); }
    function stopMusic() { MUSIC.pause(); }

    /* ══ BUBBLES ════════════════════════════════════════ */
    function makeBubbles(el) {
        if (!el) return;
        for (let i = 0; i < 16; i++) {
            const b = document.createElement('div'); b.className = 'bub';
            const sz = 5 + Math.random() * 16;
            b.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:-20px;animation-duration:${5+Math.random()*10}s;animation-delay:${Math.random()*9}s;`;
            el.appendChild(b);
        }
    }
    ['bbl0','bbl1','bbl2','bbl4'].forEach(id => makeBubbles(document.getElementById(id)));

    /* ══ SCREENS ════════════════════════════════════════ */
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        S.screen = id;
        if (id === 'menu' || id === 'game') playMusic();
        if (id === 'result') stopMusic();
    }
    function showOverlay(id) { document.getElementById('overlay-' + id).classList.add('active'); }
    function hideOverlay(id) { document.getElementById('overlay-' + id).classList.remove('active'); }

    /* ══ SLIDERS ════════════════════════════════════════ */
    function initSlider(trackId, fillId, initVal, onChange) {
        const track = document.getElementById(trackId);
        const fill  = document.getElementById(fillId);
        fill.style.width = (initVal * 100) + '%';

        function update(e) {
            const touch = e.touches ? e.touches[0] : e;
            const rect = track.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width));
            fill.style.width = (pct * 100) + '%';
            onChange(pct);
        }
        track.addEventListener('touchstart', e => { e.preventDefault(); update(e); }, { passive: false });
        track.addEventListener('touchmove',  e => { e.preventDefault(); update(e); }, { passive: false });
        track.addEventListener('mousedown',  e => {
            update(e);
            function mm(ev) { update(ev); }
            function mu()   { window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); }
            window.addEventListener('mousemove', mm);
            window.addEventListener('mouseup', mu);
        });
    }

    function initSliders() {
        initSlider('sl-sound', 'sl-sound-fill', S.soundVol, v => {
            S.soundVol = v; savePrefs();
        });
        initSlider('sl-music', 'sl-music-fill', S.musicVol, v => {
            S.musicVol = v; MUSIC.volume = v; savePrefs();
        });
        document.getElementById('sl-sound-fill').style.width = (S.soundVol * 100) + '%';
        document.getElementById('sl-music-fill').style.width = (S.musicVol * 100) + '%';
    }

    /* ══ LOADING ════════════════════════════════════════ */
    function startLoading() {
        const fill = document.getElementById('l-fill');
        let p = 0;
        const iv = setInterval(() => {
            p = Math.min(p + 2.5, 100);
            fill.style.width = p + '%';
            if (p >= 100) { clearInterval(iv); setTimeout(() => showScreen('menu'), 250); }
        }, 50);
    }

    /* ══════════════════════════════════════════════════
       FISH + GAME LOGIC
    ══════════════════════════════════════════════════ */
    const FISH_IMGS = ['fish_red','fish_brown','fish_blue','fish_green','fish_pink'];
    const FISH_COLORS = {
        fish_red:'#ff5555',fish_brown:'#8b4513',fish_blue:'#5599ff',
        fish_green:'#55cc44',fish_pink:'#ff88bb'
    };

    let fishList = [];
    let fishImages = {};
    let imagesLoaded = false;
    let gameRAF = null;

    // Load fish images once
    function loadFishImages(cb) {
        if (imagesLoaded) { cb(); return; }
        let remaining = FISH_IMGS.length;
        FISH_IMGS.forEach(name => {
            const img = new Image();
            img.onload = img.onerror = () => { if (--remaining === 0) { imagesLoaded = true; cb(); } };
            img.src = 'img/' + name + '.png';
            fishImages[name] = img;
        });
    }

    function getFishCanvas() { return document.getElementById('fish-canvas'); }
    function getDrawCanvas() { return document.getElementById('draw-canvas'); }
    function getGameArea()   { return document.getElementById('game-area'); }

    function resizeCanvases() {
        const ga = getGameArea();
        const fc = getFishCanvas();
        const dc = getDrawCanvas();
        const w = ga.offsetWidth, h = ga.offsetHeight;
        console.log('[RESIZE] ga size=', w, h);
        fc.width = dc.width = w;
        fc.height = dc.height = h;
        console.log('[RESIZE] canvas attrs set, dc.width=', dc.width, 'dc.height=', dc.height);
    }

    const FISH_SIZE = () => {
        const ga = getGameArea();
        return Math.min(ga.offsetWidth, ga.offsetHeight) * 0.11;
    };

    function createFish(count) {
        const ga = getGameArea();
        const W = ga.offsetWidth, H = ga.offsetHeight;
        const sz = FISH_SIZE();
        const newFish = [];
        for (let i = 0; i < count; i++) {
            const speed = 1.1 + Math.random() * 1.4;
            const angle = Math.random() * Math.PI * 2;
            newFish.push({
                x: sz + Math.random() * (W - sz * 2),
                y: sz + Math.random() * (H - sz * 2),
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                name: FISH_IMGS[Math.floor(Math.random() * FISH_IMGS.length)],
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.04 + Math.random() * 0.03,
                caught: false,
                alpha: 1,
            });
        }
        return newFish;
    }

    function updateFish() {
        const ga = getGameArea();
        const W = ga.offsetWidth, H = ga.offsetHeight;
        const sz = FISH_SIZE();
        fishList.forEach(f => {
            if (f.caught) return;
            f.wobble += f.wobbleSpeed;
            // slight random steering
            if (Math.random() < 0.018) {
                const a = Math.random() * Math.PI * 2;
                const spd = Math.hypot(f.vx, f.vy);
                f.vx = f.vx * 0.7 + Math.cos(a) * spd * 0.3;
                f.vy = f.vy * 0.7 + Math.sin(a) * spd * 0.3;
            }
            f.x += f.vx;
            f.y += f.vy;
            const r = sz * 0.5;
            if (f.x - r < 0)  { f.x = r;     f.vx = Math.abs(f.vx); }
            if (f.x + r > W)  { f.x = W - r; f.vx = -Math.abs(f.vx); }
            if (f.y - r < 0)  { f.y = r;     f.vy = Math.abs(f.vy); }
            if (f.y + r > H)  { f.y = H - r; f.vy = -Math.abs(f.vy); }
        });
    }

    function drawFish() {
        const fc = getFishCanvas();
        if (!fc) return;
        const ctx = fc.getContext('2d');
        const sz = FISH_SIZE();
        ctx.clearRect(0, 0, fc.width, fc.height);
        fishList.forEach(f => {
            ctx.save();
            ctx.globalAlpha = f.caught ? 0 : f.alpha;
            ctx.translate(f.x, f.y);
            // flip towards movement direction
            if (f.vx < 0) ctx.scale(-1, 1);
            ctx.rotate(Math.sin(f.wobble) * 0.1);
            const img = fishImages[f.name];
            if (img && img.complete && img.naturalWidth) {
                ctx.drawImage(img, -sz / 2, -sz / 2, sz, sz);
            } else {
                // fallback colored circle
                ctx.beginPath();
                ctx.arc(0, 0, sz * 0.45, 0, Math.PI * 2);
                ctx.fillStyle = FISH_COLORS[f.name] || '#aaa';
                ctx.fill();
            }
            ctx.restore();
        });
    }

    function gameLoop() {
        if (!S.gameRunning || S.paused) { gameRAF = requestAnimationFrame(gameLoop); return; }
        updateFish();
        drawFish();
        gameRAF = requestAnimationFrame(gameLoop);
    }

    /* ── Draw / Lasso ── */
    let drawPath = [];
    let isDrawing = false;
    const LASSO_COLOR = 'rgba(200,240,0,0.9)';
    const LASSO_WIDTH = 4;
    const CLOSE_DIST  = 55; // px in screen space

    function getCtx() { return getDrawCanvas().getContext('2d'); }

    function clearLasso() {
        const dc = getDrawCanvas();
        console.log('[LASSO] clearLasso dc.width=', dc.width, 'dc.height=', dc.height);
        getCtx().clearRect(0, 0, dc.width, dc.height);
        drawPath = [];
    }

    function renderLasso(closed) {
        if (drawPath.length < 2) return;
        const dc  = getDrawCanvas();
        const ctx = getCtx();
        console.log('[LASSO] render pts=', drawPath.length, 'closed=', closed, 'dc=', dc.width, dc.height);
        ctx.clearRect(0, 0, dc.width, dc.height);
        ctx.beginPath();
        ctx.moveTo(drawPath[0][0], drawPath[0][1]);
        for (let i = 1; i < drawPath.length; i++) ctx.lineTo(drawPath[i][0], drawPath[i][1]);
        if (closed) {
            ctx.closePath();
            ctx.fillStyle = 'rgba(200,240,0,0.10)';
            ctx.fill();
        }
        ctx.strokeStyle = LASSO_COLOR;
        ctx.lineWidth   = LASSO_WIDTH;
        ctx.lineCap = ctx.lineJoin = 'round';
        ctx.shadowColor = 'rgba(180,255,0,0.55)';
        ctx.shadowBlur  = 10;
        ctx.stroke();
        ctx.shadowBlur  = 0;
    }

    function setupDrawListeners() {
        const ga = document.getElementById('game-area');
        console.log('[DRAW] setupDrawListeners, ga=', ga);

        function getXY(e) {
            const rect = ga.getBoundingClientRect();
            const pt = e.touches ? e.touches[0] : e;
            return [pt.clientX - rect.left, pt.clientY - rect.top];
        }

        function onStart(e) {
            e.preventDefault();
            console.log('[DRAW] onStart, gameRunning=', S.gameRunning, 'paused=', S.paused);
            if (!S.gameRunning || S.paused) return;
            clearLasso();
            isDrawing = true;
            drawPath  = [getXY(e)];
        }
        function onMove(e) {
            e.preventDefault();
            if (!isDrawing || !S.gameRunning || S.paused) return;
            const pt   = getXY(e);
            const last = drawPath[drawPath.length - 1];
            if (Math.hypot(pt[0] - last[0], pt[1] - last[1]) > 4) {
                drawPath.push(pt);
                if (drawPath.length % 10 === 0) console.log('[DRAW] path pts=', drawPath.length, 'last=', pt);
                renderLasso(false);
            }
        }
        function onEnd(e) {
            e.preventDefault();
            console.log('[DRAW] onEnd, isDrawing=', isDrawing, 'pts=', drawPath.length);
            if (!isDrawing) return;
            isDrawing = false;
            if (!S.gameRunning || S.paused || drawPath.length < 8) { clearLasso(); return; }
            const f = drawPath[0], l = drawPath[drawPath.length - 1];
            const closeDist = Math.hypot(f[0] - l[0], f[1] - l[1]);
            console.log('[DRAW] closeDist=', closeDist, 'threshold=', CLOSE_DIST);
            if (closeDist > CLOSE_DIST) {
                shakeCanvas(); setTimeout(clearLasso, 400); return;
            }
            renderLasso(true);
            setTimeout(evaluateCatch, 80);
        }

        ga.addEventListener('touchstart', onStart, { passive: false });
        ga.addEventListener('touchmove',  onMove,  { passive: false });
        ga.addEventListener('touchend',   onEnd,   { passive: false });
        ga.addEventListener('mousedown',  onStart);
        ga.addEventListener('mousemove',  e => { if (isDrawing) onMove(e); });
        ga.addEventListener('mouseup',    e => { if (isDrawing) onEnd(e); });
        ga.addEventListener('mouseleave', e => { if (isDrawing) onEnd(e); });
        console.log('[DRAW] all listeners registered on game-area');
    }

    function pointInPolygon(px, py, poly) {
        let inside = false;
        for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
            const xi = poly[i][0], yi = poly[i][1];
            const xj = poly[j][0], yj = poly[j][1];
            if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
                inside = !inside;
            }
        }
        return inside;
    }

    function evaluateCatch() {
        if (!S.gameRunning) return;
        const allInside = fishList.every(f => pointInPolygon(f.x, f.y, drawPath));
        if (allInside) {
            // SUCCESS
            sndCatch();
            spawnConfetti();
            flashGameArea('good');
            const ga = getGameArea();
            const cx = ga.offsetWidth / 2, cy = ga.offsetHeight / 2;
            const caught = fishList.length;
            S.score += caught;
            document.getElementById('score-label').textContent = S.score;
            showScorePop(cx, cy, '+' + caught);
            // animate fish caught
            fishList.forEach(f => { f.caught = true; });
            setTimeout(() => {
                clearLasso();
                nextRound();
            }, 900);
        } else {
            // FAIL
            sndFail();
            flashGameArea('bad');
            clearLasso();
            setTimeout(endGame, 550);
        }
    }

    function showScorePop(x, y, text) {
        const ga = getGameArea();
        const el = document.createElement('div');
        el.className = 'score-pop';
        el.textContent = text;
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
        el.style.transform = 'translateX(-50%)';
        ga.appendChild(el);
        setTimeout(() => el.remove(), 1500);
    }

    function flashGameArea(type) {
        const ga = getGameArea();
        const el = document.createElement('div');
        el.className = 'catch-flash ' + type;
        ga.appendChild(el);
        setTimeout(() => el.remove(), 700);
    }

    function shakeCanvas() {
        const dc = getDrawCanvas();
        dc.style.transition = 'transform .08s';
        const shakes = [[4,0],[-4,0],[4,0],[0,0]];
        shakes.forEach((s, i) => setTimeout(() => {
            dc.style.transform = `translate(${s[0]}px,${s[1]}px)`;
            if (i === shakes.length - 1) dc.style.transform = '';
        }, i * 80));
    }

    function spawnConfetti() {
        const ga = getGameArea();
        const cols = ['#FFD700','#ff6b6b','#4ecdc4','#c8f000','#ff88bb','#5599ff'];
        for (let i = 0; i < 50; i++) {
            const el = document.createElement('div'); el.className = 'conf';
            const sz = 5 + Math.random() * 10;
            el.style.cssText = `width:${sz}px;height:${sz*.6}px;background:${cols[Math.floor(Math.random()*cols.length)]};left:${Math.random()*100}%;top:10%;animation-duration:${1.4+Math.random()*1.8}s;animation-delay:${Math.random()*.4}s;`;
            ga.appendChild(el);
            setTimeout(() => el.remove(), 3500);
        }
    }

    /* ── Round / Game flow ── */
    function fishCountForRound(r) { return Math.min(3 + Math.floor(r / 1), 9); }

    function nextRound() {
        S.round++;
        const count = fishCountForRound(S.round);
        fishList = createFish(count);
    }

    function startGame() {
        stopGameLoop();
        clearLasso();
        S.score = 0; S.round = 0; S.paused = false;
        document.getElementById('score-label').textContent = '0';
        document.getElementById('btn-pause').style.visibility = 'visible';
        document.getElementById('btn-topbar-resume').style.display = 'none';
        LOSE.pause(); LOSE.currentTime = 0;
        hideOverlay('pause');
        showScreen('game');
        // double rAF — first frame triggers layout, second frame reads it
        requestAnimationFrame(() => requestAnimationFrame(() => {
            console.log('[GAME] double-rAF fired, resizing canvases');
            resizeCanvases();
            S.gameRunning = true;
            console.log('[GAME] gameRunning=true, loading fish images');
            loadFishImages(() => {
                console.log('[GAME] fish images loaded, starting round');
                nextRound();
                gameRAF = requestAnimationFrame(gameLoop);
            });
        }));
    }

    function stopGameLoop() {
        S.gameRunning = false;
        if (gameRAF) { cancelAnimationFrame(gameRAF); gameRAF = null; }
        fishList = [];
        const fc = getFishCanvas(); if (fc) { const ctx = fc.getContext('2d'); ctx.clearRect(0,0,fc.width,fc.height); }
        clearLasso();
    }

    function pauseGame() {
        if (!S.gameRunning || S.paused) return;
        S.paused = true;
        document.getElementById('btn-pause').style.visibility = 'hidden';
        document.getElementById('btn-topbar-resume').style.display = 'block';
        showOverlay('pause');
    }
    function resumeGame() {
        if (!S.paused) return;
        S.paused = false;
        document.getElementById('btn-pause').style.visibility = 'visible';
        document.getElementById('btn-topbar-resume').style.display = 'none';
        document.getElementById('pause-btn-img').src = 'img/btn_pause.png';
        hideOverlay('pause');
    }
    function endGame() {
        stopGameLoop();
        sndLose();
        showScreen('result');
    }

    /* ── Back button ── */
    function onBack(e) {
        if (e) e.preventDefault();
        switch (S.screen) {
            case 'game':     if (!S.paused) pauseGame(); else resumeGame(); break;
            case 'settings': sndClick(); showScreen('menu'); break;
            case 'result':   sndClick(); showScreen('menu'); break;
            case 'menu':
                if (navigator.app) navigator.app.exitApp();
                else if (navigator.device) navigator.device.exitApp();
                break;
        }
    }
    function setupBack() {
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', () => { history.pushState(null, null, location.href); onBack(null); });
    }
    function lockPortrait() {
        try {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(() => {});
            } else if (screen.lockOrientation) {
                screen.lockOrientation('portrait');
            } else if (screen.mozLockOrientation) {
                screen.mozLockOrientation('portrait');
            } else if (screen.msLockOrientation) {
                screen.msLockOrientation('portrait');
            }
        } catch(e) {}

        try { if (window.OrientationBridge) window.OrientationBridge.lock(); } catch(e) {}
    }
    /* ── Button helper ── */
    function onBtn(id, fn) {
        const el = document.getElementById(id); if (!el) return;
        el.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, { passive: false });
        el.addEventListener('click', fn);
    }

    /* ── Window resize ── */
    window.addEventListener('resize', () => {
        if (S.screen === 'game') resizeCanvases();
    });

    /* ── Init ── */
    document.addEventListener('DOMContentLoaded', () => {
        loadPrefs(); initSliders(); setupBack(); startLoading();

        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });

        onBtn('btn-settings',   () => { sndClick(); showScreen('settings'); });
        onBtn('btn-play',       () => { sndClick(); startGame(); });
        onBtn('btn-sett-home',  () => { sndClick(); showScreen('menu'); });
        onBtn('btn-pause',          () => { sndClick(); if (!S.paused) pauseGame(); else resumeGame(); });
        onBtn('btn-topbar-resume',  () => { sndClick(); resumeGame(); });
        onBtn('btn-resume',         () => { sndClick(); resumeGame(); });
        onBtn('btn-pause-home', () => { sndClick(); stopGameLoop(); hideOverlay('pause'); showScreen('menu'); });
        onBtn('btn-retry',      () => { sndClick(); startGame(); });
        onBtn('btn-res-home',   () => { sndClick(); showScreen('menu'); });

        setupDrawListeners();

        try { if (screen.orientation?.lock) screen.orientation.lock('portrait').catch(() => {}); } catch(_) {}
        lockPortrait()
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) { stopMusic(); if (S.screen === 'game' && !S.paused) pauseGame(); }
            else { playMusic(); }
        });
        document.addEventListener('pause',  () => { stopMusic(); if (S.screen === 'game' && !S.paused) pauseGame(); }, false);
        document.addEventListener('resume', () => { playMusic(); }, false);
        window.addEventListener('pagehide', () => {
            try {
                if (window.OrientationBridge) window.OrientationBridge.unlock();
            } catch(e) {}
        });
    });

    document.addEventListener('deviceready', () => {
        document.addEventListener('backbutton', onBack, false);
        try { if (screen.orientation?.lock) screen.orientation.lock('portrait').catch(() => {}); } catch(_) {}
    }, false);
</script>
