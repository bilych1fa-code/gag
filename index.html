<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ice Fishing Funding</title>
    <style>
        /* ── Reset ── */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            touch-action: none; user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Arial Black', Arial, sans-serif;
            background: #0d3a52;
        }
        img {
            -webkit-user-drag: none; user-drag: none;
            -webkit-touch-callout: none;
            pointer-events: none; display: block;
        }

        /* ── Screens ── */
        .screen {
            position: absolute; inset: 0;
            display: none; flex-direction: column;
            align-items: center; overflow: hidden;
        }
        .screen.active { display: flex; }
        .bg { position: absolute; inset: 0; z-index: 0; }
        .bg img { width: 100%; height: 100%; object-fit: cover; }

        /* Safe area */
        :root { --safe-top: max(50px, env(safe-area-inset-top, 50px)); }

        /* ════════════════════════════════
           LOADING
        ════════════════════════════════ */
        #screen-loading .lbody {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            padding: var(--safe-top) 12% 12%;
        }
        .l-logo { width: 78%; margin-top: 5%; }
        .l-logo img { width: 100%; filter: drop-shadow(0 4px 12px rgba(0,0,0,.35)); }
        .l-hook { flex: 1; display: flex; align-items: center; justify-content: center; width: 42%; }
        .l-hook img { width: 100%; filter: drop-shadow(0 6px 16px rgba(0,0,0,.3)); animation: hookSway 2.4s ease-in-out infinite; }
        @keyframes hookSway {
            0%,100% { transform: rotate(-4deg); }
            50%      { transform: rotate(4deg); }
        }
        .l-bar-wrap { width: 100%; }
        .l-label {
            text-align: center; font-size: 13px; font-weight: 900;
            letter-spacing: 3px; color: #fff;
            text-shadow: 1px 1px 4px rgba(0,0,0,.4);
            margin-bottom: 9px;
            animation: blink .85s ease-in-out infinite alternate;
        }
        @keyframes blink { to { opacity: .25; } }
        .progress-track {
            width: 100%; height: 26px;
            background: rgba(255,255,255,.2);
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,.4);
            overflow: hidden;
        }
        #progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #1a8a50, #4de88a, #1a8a50);
            background-size: 200%;
            border-radius: 50px;
            transition: width .05s linear;
            animation: barShine 1.1s linear infinite;
        }
        @keyframes barShine { to { background-position: 200%; } }

        /* ════════════════════════════════
           MENU
        ════════════════════════════════ */
        #screen-menu .mbody {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            padding: var(--safe-top) 12% 10%;
        }
        .m-logo { width: 78%; margin-top: 5%; }
        .m-logo img { width: 100%; filter: drop-shadow(0 4px 12px rgba(0,0,0,.35)); }
        .m-hook {
            flex: 1; display: flex; align-items: center;
            justify-content: center; width: 44%;
        }
        .m-hook img {
            width: 100%;
            filter: drop-shadow(0 6px 18px rgba(0,0,0,.35));
            animation: hookSway 2.4s ease-in-out infinite;
        }
        .m-play {
            width: 58%; cursor: pointer;
            filter: drop-shadow(0 6px 14px rgba(0,0,0,.28));
            transition: transform .12s;
        }
        .m-play:active { transform: scale(.92) translateY(4px); }
        .m-play img { width: 100%; }

        /* ════════════════════════════════
           GAME
        ════════════════════════════════ */
        #screen-game .gwrap {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
        }
        /* Top bar */
        .gtopbar {
            flex-shrink: 0;
            padding: var(--safe-top) 14px 10px;
            display: flex; align-items: flex-start;
            justify-content: space-between;
            position: relative;
        }
        /* pause btn – left */
        .gpause-wrap {
            width: clamp(44px, 12vw, 60px);
            cursor: pointer; transition: transform .12s;
            filter: drop-shadow(0 3px 7px rgba(0,0,0,.3));
            flex-shrink: 0;
        }
        .gpause-wrap:active { transform: scale(.88); }
        .gpause-wrap img { width: 100%; }

        /* lives + score – right */
        .gtb-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .lives-row { display: flex; gap: 5px; align-items: center; }
        .life-icon {
            width: clamp(22px, 6vw, 32px);
            transition: transform .35s cubic-bezier(.68,-.55,.27,1.55), opacity .35s;
        }
        .life-icon img { width: 100%; }
        .life-icon.dead { opacity: .18; transform: scale(.55); }
        .score-label {
            font-size: clamp(14px, 4vw, 20px); font-weight: 900;
            color: #fff;
            text-shadow: 1px 1px 0 rgba(0,0,0,.6), 0 0 10px rgba(0,0,0,.4);
        }

        /* Game area */
        .game-area {
            flex: 1; position: relative; overflow: hidden;
        }

        /* Fishing line */
        #fishing-line {
            position: absolute;
            left: 50%; transform: translateX(-50%);
            width: 3px;
            background: linear-gradient(to bottom, rgba(200,190,160,.8), rgba(200,190,160,.3));
            top: 0; height: 0;
            pointer-events: none; z-index: 8;
            border-radius: 2px;
        }
        /* Hook in game area */
        #game-hook {
            position: absolute;
            left: 50%; transform: translateX(-50%);
            z-index: 9; pointer-events: none;
            top: 0;
        }
        #game-hook img {
            width: 100%;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,.4));
        }

        /* Fish */
        .fish-el {
            position: absolute; pointer-events: none; z-index: 5;
        }
        .fish-el img {
            width: 100%; height: 100%; object-fit: contain;
            pointer-events: none;
        }
        .fish-el.caught { z-index: 10; }

        /* Tap prompt */
        #tap-prompt {
            position: absolute; inset: 0;
            background: rgba(0,20,40,.38);
            z-index: 20;
            display: flex; align-items: center; justify-content: center;
        }
        .tap-text {
            font-size: clamp(22px, 7vw, 38px); font-weight: 900;
            color: #fff; text-align: center; line-height: 1.55;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0 rgba(0,0,0,.5), 0 0 35px rgba(80,200,255,.5);
        }

        /* Score popup */
        .score-pop {
            position: absolute;
            font-size: clamp(16px, 5vw, 26px); font-weight: 900;
            color: #FFD700;
            text-shadow: 1px 1px 0 rgba(0,0,0,.6);
            pointer-events: none; z-index: 30;
            transform: translateX(-50%);
            animation: scorePop .85s ease forwards;
        }
        @keyframes scorePop {
            0%   { opacity:1; transform:translateX(-50%) translateY(0) scale(.5); }
            35%  { opacity:1; transform:translateX(-50%) translateY(-22px) scale(1.12); }
            100% { opacity:0; transform:translateX(-50%) translateY(-60px) scale(.8); }
        }

        /* Miss flash */
        .miss-flash {
            position: absolute; inset: 0;
            background: rgba(220,60,40,.3);
            pointer-events: none; z-index: 25;
            animation: flashOut .65s ease forwards;
        }
        @keyframes flashOut { to { opacity:0; } }

        /* ════════════════════════════════
           PAUSE OVERLAY
        ════════════════════════════════ */
        #overlay-pause {
            position: absolute; inset: 0; z-index: 50;
            display: none;
        }
        #overlay-pause.active { display: block; }
        .pause-bg {
            position: absolute; inset: 0;
            background: rgba(0,15,35,.52);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        /* Back button — sits exactly where btn-pause is on the game screen */
        .pback-wrap {
            position: absolute;
            top: var(--safe-top);
            left: 14px;
            width: clamp(44px, 12vw, 60px);
            z-index: 3;
            cursor: pointer; transition: transform .12s;
            filter: drop-shadow(0 3px 7px rgba(0,0,0,.3));
        }
        .pback-wrap:active { transform: scale(.88); }
        .pback-wrap img { width: 100%; }

        /* Centered content */
        .pause-ui {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 10px;
        }
        .pause-title {
            font-size: clamp(20px, 6vw, 32px); font-weight: 900;
            color: #fff; letter-spacing: 3px;
            text-shadow: 2px 2px 0 rgba(0,0,0,.4);
        }

        /* Panel */
        .pause-panel {
            width: clamp(220px, 62%, 300px);
            background: url(img/board.png) center/100% 100% no-repeat;
            background-color: rgba(20, 90, 140, 0.75);
            border-radius: 22px;
            padding: 16px 16px 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .pp-row {
            display: flex; align-items: center;
            justify-content: center; gap: 14px;
        }
        .pp-btn {
            cursor: pointer; transition: transform .12s;
            filter: drop-shadow(0 3px 7px rgba(0,0,0,.3));
        }
        .pp-btn:active { transform: scale(.87); }
        .pp-btn img { width: 100%; display: block; }
        /* resume & restart — smaller round buttons */
        .pp-small { width: 28%; }
        .pp-icon { width: 18%; pointer-events: none; }
        .pp-icon img { width: 100%; }
        .pp-switch { width: 36%; cursor: pointer; transition: transform .1s; }
        .pp-switch:active { transform: scale(.9); }
        .pp-switch img { width: 100%; }
        .pp-full { width: 80%; }
        .pp-sep { width: 100%; height: 1px; background: rgba(255,255,255,.15); }

        /* ════════════════════════════════
           RESULT
        ════════════════════════════════ */
        #screen-result .rbody {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center;
            padding: var(--safe-top) 12% 10%;
        }
        .r-title { width: 82%; margin-top: 4%; }
        .r-title img {
            width: 100%;
            filter: drop-shadow(0 5px 14px rgba(0,0,0,.35));
            animation: titlePop .5s cubic-bezier(.68,-.55,.27,1.55);
        }
        @keyframes titlePop {
            from { transform: scale(.3); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }
        .r-scores {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 14px;
        }
        .r-line {
            font-size: clamp(18px, 5.5vw, 30px); font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0 rgba(0,0,0,.45);
            animation: slideUp .38s ease both;
        }
        .r-line:nth-child(2) { animation-delay: .16s; }
        .r-line span { color: #FFD700; }
        @keyframes slideUp {
            from { transform: translateY(16px); opacity: 0; }
            to   { transform: none; opacity: 1; }
        }
        .r-btns { width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .r-btn {
            width: 100%; cursor: pointer; transition: transform .12s;
            filter: drop-shadow(0 5px 12px rgba(0,0,0,.25));
        }
        .r-btn:active { transform: scale(.94) translateY(2px); }
        .r-btn img { width: 100%; }
    </style>
</head>
<body>

<!-- ▸ LOADING ──────────────────────────── -->
<div id="screen-loading" class="screen active">
    <div class="bg"><img src="img/main_bg.png" alt="" draggable="false"></div>
    <div class="lbody">
        <div class="l-logo"><img src="img/logo_title.png" alt="" draggable="false"></div>
        <div class="l-hook"><img src="img/hook.png" alt="" draggable="false"></div>
        <div class="l-bar-wrap">
            <div class="l-label">LOADING…</div>
            <div class="progress-track"><div id="progress-fill"></div></div>
        </div>
    </div>
</div>

<!-- ▸ MENU ──────────────────────────────── -->
<div id="screen-menu" class="screen">
    <div class="bg"><img src="img/main_bg.png" alt="" draggable="false"></div>
    <div class="mbody">
        <div class="m-logo"><img src="img/logo_title.png" alt="" draggable="false"></div>
        <div class="m-hook"><img src="img/hook.png" alt="" draggable="false"></div>
        <div class="m-play" id="btn-play">
            <img src="img/btn_play.png" alt="" draggable="false">
        </div>
    </div>
</div>

<!-- ▸ GAME ──────────────────────────────── -->
<div id="screen-game" class="screen">
    <div class="bg"><img src="img/main_bg.png" alt="" draggable="false"></div>
    <div class="gwrap">

        <!-- Top bar -->
        <div class="gtopbar">
            <div class="gpause-wrap" id="btn-pause">
                <img src="img/btn_pause.png" id="pause-icon" alt="" draggable="false">
            </div>
            <div class="gtb-right">
                <div class="lives-row" id="lives-row"></div>
                <div class="score-label" id="score-display">Score: 0</div>
            </div>
        </div>

        <!-- Game area -->
        <div class="game-area" id="game-area">
            <div id="fishing-line"></div>
            <div id="game-hook">
                <img src="img/hook.png" alt="" draggable="false">
            </div>
            <div id="tap-prompt">
                <div class="tap-text">TAP<br>TO CATCH FISH</div>
            </div>
        </div>

    </div>

    <!-- Pause overlay (inside game screen) -->
    <div id="overlay-pause">
        <div class="pause-bg"></div>
        <!-- Back button — absolutely positioned at same spot as btn-pause -->
        <div class="pback-wrap" id="btn-back">
            <img src="img/btn_back.png" alt="" draggable="false">
        </div>
        <div class="pause-ui">
            <div class="pause-title">PAUSE</div>
            <div class="pause-panel">
                <!-- Resume + Restart (smaller) -->
                <div class="pp-row">
                    <div class="pp-btn pp-small" id="btn-resume">
                        <img src="img/btn_resume.png" alt="" draggable="false">
                    </div>
                    <div class="pp-btn pp-small" id="btn-restart">
                        <img src="img/btn_restart.png" alt="" draggable="false">
                    </div>
                </div>
                <div class="pp-sep"></div>
                <!-- Music -->
                <div class="pp-row">
                    <div class="pp-icon">
                        <img src="img/music_icon.png" alt="" draggable="false">
                    </div>
                    <div class="pp-switch" id="sw-music">
                        <img src="img/switch_on.png" id="sw-music-img" alt="" draggable="false">
                    </div>
                </div>
                <!-- Sound -->
                <div class="pp-row">
                    <div class="pp-icon">
                        <img src="img/sound_icon.png" alt="" draggable="false">
                    </div>
                    <div class="pp-switch" id="sw-sound">
                        <img src="img/switch_on.png" id="sw-sound-img" alt="" draggable="false">
                    </div>
                </div>
                <div class="pp-sep"></div>
                <!-- Home -->
                <div class="pp-row">
                    <div class="pp-btn pp-full" id="btn-p-home">
                        <img src="img/btn_home.png" alt="" draggable="false">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ▸ RESULT ────────────────────────────── -->
<div id="screen-result" class="screen">
    <div class="bg"><img src="img/main_bg.png" alt="" draggable="false"></div>
    <div class="rbody">
        <div class="r-title"><img src="img/result_title.png" alt="" draggable="false"></div>
        <div class="r-scores">
            <div class="r-line">Score: <span id="res-score">0</span></div>
            <div class="r-line">Best score: <span id="res-best">0</span></div>
        </div>
        <div class="r-btns">
            <div class="r-btn" id="btn-try-again">
                <img src="img/btn_try_again.png" alt="" draggable="false">
            </div>
            <div class="r-btn" id="btn-res-home">
                <img src="img/btn_res_home.png" alt="" draggable="false">
            </div>
        </div>
    </div>
</div>

<!-- Audio -->
<audio id="aud-music"  src="img/music.mp3"        loop></audio>
<audio id="aud-click"  src="img/click_sound.wav"        ></audio>
<audio id="aud-catch"  src="img/catch.mp3"              ></audio>
<audio id="aud-miss"   src="img/miss.mp3"               ></audio>
<audio id="aud-lose"   src="img/lose.mp3"               ></audio>

<script>
    'use strict';
    /* ═══════════════════════════════════════════════════════
       ICE FISHING FUNDING — Cordova HTML5 mini-game

       Assets in /img/:
         main_bg.png, logo_title.png, hook.png
         btn_play.png, btn_pause.png, btn_back.png
         life.png (heart icon)
         fish.png (faces LEFT by default)
         board.png (pause-panel background)
         result_title.png, btn_try_again.png, btn_res_home.png
         btn_resume.png, btn_restart.png, btn_home.png
         music_icon.png, icon_sound.png
         switch_on.png, switch_off.png
       Audio:
         music.mp3, click_sound.wav, catch.mp3, miss.mp3, lose.mp3
    ═══════════════════════════════════════════════════════ */

    // ─── Config ───────────────────────────────────────────────
    const CFG = {
        MAX_LIVES:     3,
        FISH_W_RATIO:  0.155,   // fish width as fraction of game-area width
        HOOK_W_RATIO:  0.135,   // hook width fraction
        DROP_SPEED:    380,     // px / sec going down
        RISE_SPEED:    330,     // px / sec going up
        CATCH_X:       48,      // horizontal tolerance for catching (px)
        CATCH_Y:       28,      // vertical tolerance when hook tip passes fish center (px)
        FISH_SPEED_MIN:55,
        FISH_SPEED_MAX:120,
        FIRST_CATCH_DELAY: 900, // ms before "caught" stagger ends and hook finishes
    };

    // ─── State ────────────────────────────────────────────────
    const S = {
        screen:    'loading',
        running:   false,
        paused:    false,
        lives:     CFG.MAX_LIVES,
        score:     0,
        bestScore: 0,
        soundOn:   true,
        musicOn:   true,
        audReady:  false,

        hookY:     0,        // top edge of hook image in game area
        hookH:     60,       // hook element height (set on start)
        hookState: 'idle',   // 'idle' | 'dropping' | 'rising'

        fish:       [],      // array of fish objects
        caughtFish: [],      // fish caught this drop

        tapDone:   false,    // first tap done (prompt dismissed)
        raf:       null,
        lastTs:    0,
    };

    // ─── DOM refs ─────────────────────────────────────────────
    let $gameArea, $hookEl, $lineEl;

    // ─── Storage ──────────────────────────────────────────────
    function loadStorage() {
        const b = localStorage.getItem('iff_best');
        const s = localStorage.getItem('iff_sound');
        const m = localStorage.getItem('iff_music');
        S.bestScore = b ? parseInt(b, 10) : 0;
        S.soundOn   = s === null ? true : s !== 'false';
        S.musicOn   = m === null ? true : m !== 'false';
    }
    function savePrefs()  { localStorage.setItem('iff_sound', S.soundOn); localStorage.setItem('iff_music', S.musicOn); }
    function saveBest()   { localStorage.setItem('iff_best', S.bestScore); }

    // ─── Audio ────────────────────────────────────────────────
    const MUSIC = document.getElementById('aud-music');
    function unlockAudio() {
        if (S.audReady) return;
        S.audReady = true;
        MUSIC.volume = 0.55;
        MUSIC.play().then(() => { if (!S.musicOn) MUSIC.pause(); }).catch(() => {});
    }
    function playMusic() { if (!S.musicOn || !S.audReady) return; if (MUSIC.paused) MUSIC.play().catch(() => {}); }
    function stopMusic() { MUSIC.pause(); }
    function snd(id) {
        if (!S.soundOn) return;
        const el = document.getElementById(id);
        if (!el) return;
        el.currentTime = 0;
        el.play().catch(() => {});
    }

    // ─── Screen ───────────────────────────────────────────────
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        S.screen = id;
        if (id === 'menu' || id === 'game') playMusic();
    }
    function showOverlay(id)  { document.getElementById('overlay-' + id).classList.add('active'); }
    function hideOverlay(id)  { document.getElementById('overlay-' + id).classList.remove('active'); }

    // ─── Loading ──────────────────────────────────────────────
    function startLoading() {
        const fill = document.getElementById('progress-fill');
        let p = 0;
        const iv = setInterval(() => {
            p = Math.min(p + 1.8, 100);
            fill.style.width = p + '%';
            if (p >= 100) { clearInterval(iv); setTimeout(() => showScreen('menu'), 300); }
        }, 36);
    }

    // ─── Lives UI ─────────────────────────────────────────────
    function buildLives() {
        const row = document.getElementById('lives-row');
        row.innerHTML = '';
        for (let i = 0; i < CFG.MAX_LIVES; i++) {
            const d = document.createElement('div');
            d.className = 'life-icon';
            d.id = 'life-' + i;
            d.innerHTML = '<img src="img/life.png" alt="" draggable="false">';
            row.appendChild(d);
        }
    }
    function refreshLives() {
        for (let i = 0; i < CFG.MAX_LIVES; i++) {
            const el = document.getElementById('life-' + i);
            if (el) el.classList.toggle('dead', i >= S.lives);
        }
    }

    // ─── Score UI ─────────────────────────────────────────────
    function updateScoreUI() {
        document.getElementById('score-display').textContent = 'Score: ' + S.score;
    }

    // ─── Hook DOM ─────────────────────────────────────────────
    function initHookDOM() {
        $gameArea = document.getElementById('game-area');
        $hookEl   = document.getElementById('game-hook');
        $lineEl   = document.getElementById('fishing-line');

        const aw   = $gameArea.offsetWidth;
        const size = Math.round(Math.max(44, Math.min(aw * CFG.HOOK_W_RATIO, 72)));
        $hookEl.style.width  = size + 'px';
        $hookEl.style.height = 'auto';
        S.hookH  = size;
        S.hookY  = 0;
        renderHook();
    }

    function renderHook() {
        $hookEl.style.top  = S.hookY + 'px';
        const lineH = Math.max(0, S.hookY + S.hookH * 0.25);
        $lineEl.style.height = lineH + 'px';
    }

    function hookTipY() { return S.hookY + S.hookH * 0.88; } // approximate tip position

    // ─── Fish ─────────────────────────────────────────────────
    function spawnAllFish() {
        // Remove old fish elements
        $gameArea.querySelectorAll('.fish-el').forEach(e => e.remove());
        S.fish = [];

        const aw = $gameArea.offsetWidth;
        const ah = $gameArea.offsetHeight;
        const fw = Math.round(Math.max(55, aw * CFG.FISH_W_RATIO));
        const fh = Math.round(fw * 0.58);

        const laneCount = ah > 560 ? 4 : 3;
        const topPad    = ah * 0.11;
        const botPad    = ah * 0.10;
        const usableH   = ah - topPad - botPad;

        for (let lane = 0; lane < laneCount; lane++) {
            const laneY = topPad + (usableH / Math.max(laneCount - 1, 1)) * lane;
            const perLane = 1 + Math.floor(Math.random() * 2); // 1 or 2 fish per lane
            for (let j = 0; j < perLane; j++) {
                spawnOneFish(lane, laneY, aw, fw, fh, j, perLane);
            }
        }
    }

    function spawnOneFish(lane, laneY, aw, fw, fh, slot, total) {
        const el  = document.createElement('div');
        el.className = 'fish-el';
        el.style.width  = fw + 'px';
        el.style.height = fh + 'px';

        const img = document.createElement('img');
        img.src = 'img/fish.png';
        img.alt = '';
        img.setAttribute('draggable', 'false');
        el.appendChild(img);
        $gameArea.appendChild(el);

        const dir   = Math.random() > 0.5 ? 1 : -1;
        const speed = CFG.FISH_SPEED_MIN + Math.random() * (CFG.FISH_SPEED_MAX - CFG.FISH_SPEED_MIN);
        const startX = (slot * aw / total) + Math.random() * (aw / total - fw);
        const clampedX = Math.max(0, Math.min(startX, aw - fw));

        const fish = {
            el, img,
            x:     clampedX,
            y:     laneY - fh / 2,
            vx:    speed * dir,
            fw, fh, lane,
            caught: false,
            points: 5 + Math.floor(Math.random() * 6),
        };

        el.style.left = fish.x + 'px';
        el.style.top  = fish.y + 'px';
        img.style.transform = dir > 0 ? 'scaleX(-1)' : 'scaleX(1)';

        S.fish.push(fish);
        return fish;
    }

    function addRespawnFish() {
        const aw = $gameArea.offsetWidth;
        const ah = $gameArea.offsetHeight;
        const fw = Math.round(Math.max(55, aw * CFG.FISH_W_RATIO));
        const fh = Math.round(fw * 0.58);
        const laneCount = ah > 560 ? 4 : 3;
        const topPad = ah * 0.11, botPad = ah * 0.10;
        const usableH = ah - topPad - botPad;

        for (let k = 0; k < 3; k++) {
            const lane  = Math.floor(Math.random() * laneCount);
            const laneY = topPad + (usableH / Math.max(laneCount - 1, 1)) * lane;
            spawnOneFish(lane, laneY, aw, fw, fh, 0, 1);
        }
    }

    // ─── Drop / Hook logic ────────────────────────────────────
    function dropHook() {
        if (S.hookState !== 'idle') return;
        S.hookState = 'dropping';
        S.caughtFish = [];
        S.fish.forEach(f => f.caught = false);
    }

    // ─── Game loop ────────────────────────────────────────────
    function gameLoop(ts) {
        if (!S.running) return;
        const dt = S.lastTs ? Math.min((ts - S.lastTs) / 1000, 0.05) : 0;
        S.lastTs = ts;

        if (!S.paused) {
            const aw = $gameArea.offsetWidth;
            const ah = $gameArea.offsetHeight;

            // ── Move fish ──
            for (const f of S.fish) {
                if (f.caught) continue;
                f.x += f.vx * dt;
                if (f.x <= 0)        { f.x = 0;        f.vx =  Math.abs(f.vx); }
                else if (f.x + f.fw >= aw) { f.x = aw - f.fw; f.vx = -Math.abs(f.vx); }
                f.el.style.left = f.x + 'px';
                // flip direction: original image faces left
                // vx > 0 means moving right → flip → scaleX(-1)
                f.img.style.transform = f.vx > 0 ? 'scaleX(-1)' : 'scaleX(1)';
            }

            // ── Move hook ──
            if (S.hookState === 'dropping') {
                S.hookY += CFG.DROP_SPEED * dt;

                // Collision check
                const cx  = aw / 2;
                const tip = hookTipY();
                for (const f of S.fish) {
                    if (f.caught) continue;
                    const fcx = f.x + f.fw / 2;
                    const fcy = f.y + f.fh / 2;
                    if (
                        Math.abs(cx  - fcx) < CFG.CATCH_X + f.fw * 0.35 &&
                        Math.abs(tip - fcy) < CFG.CATCH_Y + f.fh * 0.45
                    ) {
                        f.caught = true;
                        f.el.classList.add('caught');
                        S.caughtFish.push(f);
                        snd('aud-catch');
                    }
                }

                if (S.hookY >= ah - S.hookH * 0.5) {
                    S.hookY = ah - S.hookH * 0.5;
                    S.hookState = 'rising';
                }

            } else if (S.hookState === 'rising') {
                S.hookY -= CFG.RISE_SPEED * dt;

                // Collision check on the way UP too
                const cx2  = aw / 2;
                const tip2 = hookTipY();
                for (const f of S.fish) {
                    if (f.caught) continue;
                    const fcx2 = f.x + f.fw / 2;
                    const fcy2 = f.y + f.fh / 2;
                    if (
                        Math.abs(cx2  - fcx2) < CFG.CATCH_X + f.fw * 0.35 &&
                        Math.abs(tip2 - fcy2) < CFG.CATCH_Y + f.fh * 0.45
                    ) {
                        f.caught = true;
                        f.el.classList.add('caught');
                        S.caughtFish.push(f);
                        snd('aud-catch');
                    }
                }

                // Move caught fish with hook
                S.caughtFish.forEach((f, idx) => {
                    if (!f.caught) return;
                    f.x = cx2 - f.fw / 2;
                    f.y = S.hookY - f.fh * (0.2 + idx * 0.6);
                    f.el.style.left = f.x + 'px';
                    f.el.style.top  = f.y + 'px';
                });

                if (S.hookY <= 0) {
                    S.hookY = 0;
                    S.hookState = 'idle';
                    hookArrived();
                }
            }

            renderHook();
        }

        S.raf = requestAnimationFrame(gameLoop);
    }

    function hookArrived() {
        if (S.caughtFish.length > 0) {
            // Score gained fish
            let total = 0;
            S.caughtFish.forEach(f => {
                total += f.points;
                showScorePop(f.x + f.fw / 2, f.y, '+' + f.points);
                // Animate fish disappearing
                f.el.style.transition = 'opacity .32s ease, transform .32s ease';
                f.el.style.opacity    = '0';
                f.el.style.transform  = 'scale(.2)';
                setTimeout(() => { if (f.el.parentNode) f.el.remove(); }, 370);
            });
            S.score += total;
            updateScoreUI();

            // Remove caught fish from array
            S.fish = S.fish.filter(f => !f.caught);

            // Respawn if too few fish
            if (S.fish.length < 3) {
                setTimeout(() => { if (S.running) addRespawnFish(); }, 500);
            }

            S.caughtFish = [];
        } else {
            // Miss – lose a life
            S.lives--;
            refreshLives();
            showMissFlash();
            snd('aud-miss');
            if (S.lives <= 0) setTimeout(gameOver, 650);
        }
    }

    function showScorePop(x, y, text) {
        const el = document.createElement('div');
        el.className   = 'score-pop';
        el.textContent = text;
        el.style.left  = x + 'px';
        el.style.top   = y + 'px';
        $gameArea.appendChild(el);
        setTimeout(() => el.remove(), 900);
    }

    function showMissFlash() {
        const el = document.createElement('div');
        el.className = 'miss-flash';
        $gameArea.appendChild(el);
        setTimeout(() => el.remove(), 700);
    }

    // ─── Pause / Resume ───────────────────────────────────────
    function pauseGame() {
        if (!S.running || S.paused) return;
        S.paused = true;
        showOverlay('pause');
    }
    function resumeGame() {
        if (!S.paused) return;
        S.paused  = false;
        S.lastTs  = 0;
        hideOverlay('pause');
    }

    // ─── Full stop (cleanup) ──────────────────────────────────
    function fullStop() {
        S.running = false;
        S.paused  = false;
        cancelAnimationFrame(S.raf); S.raf = null;
        if ($gameArea) $gameArea.querySelectorAll('.fish-el').forEach(e => e.remove());
        S.fish = []; S.caughtFish = [];
    }

    // ─── Start game ───────────────────────────────────────────
    function startGame() {
        fullStop();
        showScreen('game');
        hideOverlay('pause');

        S.lives     = CFG.MAX_LIVES;
        S.score     = 0;
        S.running   = true;
        S.paused    = false;
        S.hookState = 'idle';
        S.hookY     = 0;
        S.tapDone   = false;
        S.lastTs    = 0;

        buildLives();
        refreshLives();
        updateScoreUI();
        syncAudioUI();
        playMusic();

        // Reset tap prompt
        const prompt = document.getElementById('tap-prompt');
        prompt.style.display   = 'flex';
        prompt.style.opacity   = '1';
        prompt.style.transition = '';

        // Wait for layout then init
        requestAnimationFrame(() => requestAnimationFrame(() => {
            initHookDOM();
            spawnAllFish();
            S.raf = requestAnimationFrame(gameLoop);
        }));
    }

    // ─── Game over ────────────────────────────────────────────
    function gameOver() {
        fullStop();
        snd('aud-lose');
        stopMusic();

        if (S.score > S.bestScore) { S.bestScore = S.score; saveBest(); }
        document.getElementById('res-score').textContent = S.score;
        document.getElementById('res-best').textContent  = S.bestScore;
        showScreen('result');
    }

    // ─── Audio UI ─────────────────────────────────────────────
    function syncAudioUI() {
        const mi = document.getElementById('sw-music-img');
        const si = document.getElementById('sw-sound-img');
        if (mi) mi.src = S.musicOn ? 'img/switch_on.png' : 'img/switch_off.png';
        if (si) si.src = S.soundOn ? 'img/switch_on.png' : 'img/switch_off.png';
    }

    // ─── Back button ──────────────────────────────────────────
    function onBack(e) {
        e.preventDefault();
        const ov = document.getElementById('overlay-pause');
        if (ov && ov.classList.contains('active')) {
            snd('aud-click'); resumeGame(); return;
        }
        switch (S.screen) {
            case 'game':
                if (S.running && !S.paused) { snd('aud-click'); pauseGame(); }
                break;
            case 'result':
                snd('aud-click'); fullStop(); showScreen('menu');
                break;
            case 'menu':
                if (navigator.app)         navigator.app.exitApp();
                else if (navigator.device) navigator.device.exitApp();
                break;
        }
    }

    function setupBack() {
        history.pushState(null, null, location.href);
        window.addEventListener('popstate', () => {
            history.pushState(null, null, location.href);
            onBack({ preventDefault() {} });
        });
    }

    // ─── Lock portrait ────────────────────────────────────────
    function lockPortrait() {
        try {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait').catch(() => {});
            } else if (screen.lockOrientation) {
                screen.lockOrientation('portrait');
            } else if (screen.mozLockOrientation) {
                screen.mozLockOrientation('portrait');
            } else if (screen.msLockOrientation) {
                screen.msLockOrientation('portrait');
            }
        } catch(e) {}

        try { if (window.OrientationBridge) window.OrientationBridge.lock(); } catch(e) {}
    }

    // ─── Button helper (tap + click both work) ────────────────
    function onBtn(id, fn) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, { passive: false });
        el.addEventListener('click', fn);
    }

    // ─── Init ─────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
        loadStorage();
        setupBack();
        startLoading();

        // Global preventions
        document.addEventListener('dragstart',   e => e.preventDefault());
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('touchstart',  unlockAudio, { once: true });
        document.addEventListener('click',       unlockAudio, { once: true });

        // ── Buttons ──
        onBtn('btn-play', () => { snd('aud-click'); startGame(); });

        onBtn('btn-pause', () => { snd('aud-click'); pauseGame(); });

        onBtn('btn-back', () => { snd('aud-click'); resumeGame(); });

        onBtn('btn-resume', () => { snd('aud-click'); resumeGame(); });

        onBtn('btn-restart', () => { snd('aud-click'); startGame(); });

        onBtn('sw-music', () => {
            S.musicOn = !S.musicOn; savePrefs();
            S.musicOn ? playMusic() : stopMusic();
            syncAudioUI();
        });

        onBtn('sw-sound', () => {
            S.soundOn = !S.soundOn; savePrefs();
            snd('aud-click');
            syncAudioUI();
        });

        onBtn('btn-p-home', () => {
            snd('aud-click');
            hideOverlay('pause');
            fullStop();
            showScreen('menu');
        });

        onBtn('btn-try-again', () => { snd('aud-click'); startGame(); });

        onBtn('btn-res-home', () => { snd('aud-click'); fullStop(); showScreen('menu'); });

        // ── Game area tap (drop hook) ──
        const ga = document.getElementById('game-area');
        function onGameTap() {
            if (!S.running || S.paused || S.hookState !== 'idle') return;
            if (!S.tapDone) {
                S.tapDone = true;
                const prompt = document.getElementById('tap-prompt');
                prompt.style.transition = 'opacity .35s ease';
                prompt.style.opacity    = '0';
                setTimeout(() => { prompt.style.display = 'none'; }, 380);
            }
            dropHook();
        }
        ga.addEventListener('touchstart', e => { e.preventDefault(); onGameTap(); }, { passive: false });
        ga.addEventListener('mousedown',  e => { e.preventDefault(); onGameTap(); });

        syncAudioUI();
        lockPortrait();

        // Visibility / Cordova lifecycle
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                stopMusic();
                if (S.running && !S.paused) pauseGame();
            } else {
                if (S.musicOn) playMusic();
            }
        });
        document.addEventListener('pause',  () => { stopMusic(); if (S.running && !S.paused) pauseGame(); }, false);
        document.addEventListener('resume', () => { if (S.musicOn) playMusic(); }, false);
        window.addEventListener('pagehide', () => {
            try {
                if (window.OrientationBridge) window.OrientationBridge.unlock();
            } catch(e) {}
        });
    });

    // Cordova deviceready
    document.addEventListener('deviceready', () => {
        document.addEventListener('backbutton', onBack, false);
        lockPortrait();
    }, false);
</script>
</body>
